<nav class="navbar">
  <div class="navbar__container">
    <a class="navbar__brand" href="#title" (click)="closeMenu()">
      <app-k-icon [size]="28" />
      Karl Scholze
    </a>

    <button class="navbar__toggle" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-label="Menu">
      <span [class.open]="isMenuOpen()"></span>
      <span [class.open]="isMenuOpen()"></span>
      <span [class.open]="isMenuOpen()"></span>
    </button>

    <div class="navbar__menu" [class.open]="isMenuOpen()">
      <a class="navbar__link" href="#about"     (click)="closeMenu()">{{ 'nav.about'     | translate }}</a>
      <a class="navbar__link" href="#offerings" (click)="closeMenu()">{{ 'nav.offerings' | translate }}</a>
      <a class="navbar__link" href="#skills"    (click)="closeMenu()">{{ 'nav.skills'    | translate }}</a>
      <a class="navbar__link" href="#contact" (click)="closeMenu()">{{ 'nav.contact' | translate }}</a>
      <div class="navbar__legal">
        <button class="navbar__link navbar__link--legal" (click)="navigateLegal('/impressum')">{{ 'footer.impressum' | translate }}</button>
        <button class="navbar__link navbar__link--legal" (click)="navigateLegal('/datenschutz')">{{ 'footer.datenschutz' | translate }}</button>
      </div>

      <div class="navbar__lang">
        @for (option of languageOptions; track option.code) {
          <button
            class="lang-btn"
            [class.active]="translationService.currentLang() === option.code"
            (click)="selectLanguage(option.code)"
          >{{ option.label }}</button>
        }
      </div>
    </div>
  </div>
</nav>
