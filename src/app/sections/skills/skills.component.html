<section class="skills section section--gray" id="skills">
  <div class="container">
    <h2 class="section-title">{{ 'skills.title' | translate }}</h2>
    <div class="skills__grid">
      @for (group of skillGroups; track group.labelKey) {
        <div class="skill-group">
          <h3 class="skill-group__label">{{ group.labelKey | translate }}</h3>
          <div class="skill-group__tags">
            @for (skill of group.skills; track skill) {
              <span class="skill-tag">{{ skill }}</span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
